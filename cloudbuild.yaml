steps:
  - name: gcr.io/cloud-builders/docker
    entrypoint: docker
    args:
      - build
      - '--platform=linux/amd64'
      - '--tag'
      - >-
        ${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${SHORT_SHA}
      - '--build-arg'
      - VITE_FIREBASE_API_KEY=${_VITE_FIREBASE_API_KEY}
      - '--build-arg'
      - VITE_FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN}
      - '--build-arg'
      - VITE_FIREBASE_DATABASE_URL=${_VITE_FIREBASE_DATABASE_URL}
      - '--build-arg'
      - VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID}
      - '--build-arg'
      - VITE_FIREBASE_STORAGE_BUCKET=${_VITE_FIREBASE_STORAGE_BUCKET}
      - '--build-arg'
      - VITE_FIREBASE_MESSAGING_SENDER_ID=${_VITE_FIREBASE_MESSAGING_SENDER_ID}
      - '--build-arg'
      - VITE_FIREBASE_APP_ID=${_VITE_FIREBASE_APP_ID}
      - '--build-arg'
      - VITE_BUSINESS_ID=${_VITE_BUSINESS_ID}
      - '--build-arg'
      - VITE_BACKEND_URL=${_VITE_BACKEND_URL}
      - '--file'
      - Dockerfile
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - >-
        ${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${SHORT_SHA}
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - >-
        --image=${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${SHORT_SHA}
      - '--region=${_LOCATION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=128Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--concurrency=80'

substitutions:
  _LOCATION: us-central1
  _REPOSITORY: cloud-run-source-deploy
  _SERVICE_NAME: kiro
  _VITE_FIREBASE_API_KEY: AIzaSyBMSo13KqpTkjSaoHM7DJWl-r1acxfA_kM
  _VITE_FIREBASE_AUTH_DOMAIN: orvana-dev.firebaseapp.com
  _VITE_FIREBASE_DATABASE_URL: https://orvana-dev-default-rtdb.firebaseio.com
  _VITE_FIREBASE_PROJECT_ID: orvana-dev
  _VITE_FIREBASE_STORAGE_BUCKET: orvana-dev.firebasestorage.app
  _VITE_FIREBASE_MESSAGING_SENDER_ID: '1030227170147'
  _VITE_FIREBASE_APP_ID: 1:1030227170147:web:f84c4e68ee1707889ff956
  _VITE_BUSINESS_ID: b_002
  _VITE_BACKEND_URL: https://kiro-backend-1030227170147.us-central1.run.app

options:
